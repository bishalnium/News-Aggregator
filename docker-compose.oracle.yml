services:
  mysql:
    image: mysql:8.4
    container_name: newscodex-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: newscodex-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data

  watchdog:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: newscodex-watchdog
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/app/data
    command: python processing/watchdog_daemon.py
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql_data:
  backend_data:
