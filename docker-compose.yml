services:
  mysql:
    image: mysql:8.4
    container_name: newscodex-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: newscodex
      MYSQL_USER: newscodex
      MYSQL_PASSWORD: newscodex
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
